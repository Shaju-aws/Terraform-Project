- name: configuring cart application
  hosts: cart
  become: true
  tasks:
    - name: enabling nodejs:20
      command: dnf module enable nodejs:20 -y
    - name: installing nodejs
      package:
        name: nodejs
        state: present
    - name: creating roboshop system user
      user:
        name: roboshop
        system: true
        shell: /sbin/nologin
    - name: creating new directory
      file:
        path: /app
        state: directory
    - name: download code to /app
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
        dest: /tmp/cart.zip
    - name: unzipping application content
      unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: true
    - name: copy cart.server to server
      template:
        src: cart.service.j2
        dest: /etc/systemd/system/cart.service
    - name: daemon re-load
      systemd_service:
        name: cart
        daemon-reload: true
    - name: start and enable service
      service:
        name: cart
        state: restarted
        enabled: true
        