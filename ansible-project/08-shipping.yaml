- name: configuring shipping application
  hosts: shipping
  become: true
  tasks:
    - name: installing maven & mysql
      package:
        name: "{{ item }}"
        state: present
      loop:
      - maven
      - mysql
    - name: create a roboshop user
      user:
        name: roboshop
        system: true
        shell: /sbin/nologin
    - name: creating new directory
      file:
        path: /app
        state: directory
    - name: download code to /app
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
        dest: /tmp/shipping.zip
    - name: unzipping application content
      unarchive:
        src: /tmp/shipping.zip
        dest: /app
        remote_src: true
    - name: install dependencies
      command: mvn clean package
      args:
        chdir: /app
    - name: move shipping jar
      command: mv target/shipping-1.0.jar shipping.jar 
      args:
        chdir: /app
    - name: copy shipping.server to server
      template:
          src: shipping.service.j2
          dest: /etc/systemd/system/shipping.service
    - name: install python dependencies
      pip:
        name: PyMySQL
        executable: pip3.9

    - name: load mysql data
      community.mysql.mysql_db:
        state: import
        name: all
        login_user: root
        login_password: RoboShop@1
        login_host: "{{ MYSQL_HOST }}"
        target: "{{ item }}"
      loop:
      - /app/db/schema.sql
      - /app/db/app-user.sql 
      - /app/db/master-data.sql
    - name: deamon reload
      systemd_service:
        name: shipping
        daemon_reload: true
    - name: enable and start shipping
      service:
        name: shipping
        state: restarted
        enabled: true