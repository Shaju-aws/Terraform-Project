- name: configuring user server
  hosts: user
  become: true
  tasks:
  - name: enabling nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: installing nodejs
    package:
      name: nodejs
      state: present
  - name: creating roboshop system user
    user:
      name: roboshop
      system: true
      shell: /sbin/nologin
  - name: creating new directory
    file:
      path: /app
      state: directory
  - name: download code to /app
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user-v3.zip
  - name: unzipping application content
    unarchive:
      src: /tmp/user-v3.zip
      dest: /app
      remote_src: true
  - name: installing npm dependencies
    npm:
      path: /app
  - name: copying user.repo to system file
    template:
      src: user.service.j2
      dest: /etc/systemd/system/user.service
  - name: deamon reload
    systemd_service:
      name: user
      daemon_reload: true
  - name: enable and start catalogue
    service:
      name: user
      state: restarted
      enabled: yes